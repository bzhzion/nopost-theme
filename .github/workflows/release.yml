name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release zip
        run: |
          mkdir -p dist
          cd ..
          zip -r $GITHUB_WORKSPACE/dist/nopost-theme.zip nopost-theme/ \
            --exclude "nopost-theme/.git/*" \
            --exclude "nopost-theme/.github/*" \
            --exclude "nopost-theme/dist/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nopost-theme.zip
          path: dist/nopost-theme.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/nopost-theme.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
